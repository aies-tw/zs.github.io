<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企業遠端存取入口</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif;
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #ffffff;
      border-bottom: 1px solid #d0d0d0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* SVG Shield logo (Zscaler-style) */
    .logo-icon {
      width: 52px;
      height: 52px;
    }

    .header-divider {
      width: 1px;
      height: 40px;
      background: #ccc;
    }

    .header-title {
      font-size: 18px;
      font-weight: 400;
      color: #333;
      letter-spacing: 0.2px;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      padding: 40px 48px 44px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #00b0ca;
      margin-bottom: 28px;
      line-height: 1.4;
    }

    /* ── Radio options ── */
    .options {
      text-align: left;
      margin-bottom: 32px;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 4px;
      cursor: pointer;
      font-size: 15px;
      color: #333;
    }

    .option-label input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #aaa;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }

    .option-label input[type="radio"]:checked {
      border-color: #00b0ca;
    }

    .option-label input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 9px;
      height: 9px;
      background: #00b0ca;
      border-radius: 50%;
    }

    /* ── Logon button ── */
    .btn-logon {
      display: inline-block;
      padding: 13px 64px;
      background: #00b0ca;
      color: #ffffff;
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn-logon:hover {
      background: #0099b0;
    }

    .btn-logon:active {
      background: #007f93;
      transform: scale(0.98);
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 16px 20px 20px;
      font-size: 13px;
      color: #666;
    }

    .footer a {
      color: #00b0ca;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <!-- Shield / secure access icon -->
      <svg class="logo-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M26 4L6 12v14c0 12.5 8.5 24.2 20 27 11.5-2.8 20-14.5 20-27V12L26 4z" fill="#00b0ca"/>
        <path d="M18 26l5.5 5.5L34 21" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="header-divider"></div>
      <span class="header-title">企業遠端安全存取入口</span>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="card">
      <div class="card-title">Secure Remote Access<br>for Enterprise</div>

      <div class="options">
        <label class="option-label">
          <input type="radio" name="auth" value="zscaler" checked>
          Zscaler Private Access (ZPA)
        </label>
        <label class="option-label">
          <input type="radio" name="auth" value="saml">
          SSO / SAML Login
        </label>
        <label class="option-label">
          <input type="radio" name="auth" value="guest">
          Guest / Vendor Access
        </label>
      </div>

      <a
        class="btn-logon"
        id="logonBtn"
        href="https://p.zpa-auth.net/IevTunx4Bg/doauth?origurl=https%3A%2F%2Fremote%2Epantw%2Eorg%3A443%2F"
      >
        Logon
      </a>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    客服電話：(02)XXXX-XXXX&nbsp;&nbsp;
    <a href="mailto:helpdesk@pantw.org">IT Helpdesk</a>
  </div>

  <script>
    // 三個選項都導向同一個 Zscaler portal（可依需求調整）
    const ZSCALER_URL = 'https://p.zpa-auth.net/IevTunx4Bg/doauth?origurl=https%3A%2F%2Fremote%2Epantw%2Eorg%3A443%2F';
    document.getElementById('logonBtn').href = ZSCALER_URL;
  </script>

</body>
</html>
